spring:
  application:
    name: beauty-ecommerce
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/beauty_ecommerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YmVhdXR5LWVjb21tZXJjZS1zZWNyZXQta2V5LXRoaXMtaXMtYS1sb25nLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
  expiration: 3600000 # 1 hour for access token
  refresh-expiration: 604800000 # 7 days for refresh token
